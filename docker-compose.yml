services:
  app:
    build: .
    container_name: c30-admin
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json
    environment:
      - C30_CONFIG_PATH=/app/config.json
      - C30_FRONTEND_DIST=/app/frontend/dist
    ports:
      - "8000:8000"
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: c30-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app