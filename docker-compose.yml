services:
  app:
    build: .
    container_name: c30-admin
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json
      - ./schedule_cache.json:/app/schedule_cache.json
    environment:
      - C30_CONFIG_PATH=/app/config.json
      - C30_FRONTEND_DIST=/app/frontend/dist
    ports:
      - "8080:8080"
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
